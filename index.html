<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0a14" />

    <title>WiCyS Northeastern — Women in Cybersecurity</title>
    <meta
      name="description"
      content="The Northeastern University chapter of Women in Cybersecurity (WiCyS). We recruit, retain, and advance women and gender-nonconforming folks in cybersecurity through workshops, networking, and community."
    />

    <!-- Open Graph / social preview -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="WiCyS Northeastern — Women in Cybersecurity" />
    <meta
      property="og:description"
      content="A community of engagement, encouragement, and support for women in cybersecurity at Northeastern University."
    />
    <meta property="og:image" content="/og-image.svg" />
    <meta name="twitter:card" content="summary_large_image" />

    <!--
      Netlify Forms detection.
      Netlify's build bots scan the deployed HTML for forms. Because this is a
      client-rendered SPA, we register the "newsletter" form here as a hidden,
      static HTML form so Netlify knows it exists. The real, interactive form in
      the React app posts to this same form name.
    -->
    <form name="newsletter" netlify netlify-honeypot="bot-field" hidden>
      <input type="email" name="email" />
      <input type="text" name="name" />
      <input type="text" name="bot-field" />
    </form>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!--
      Netlify Identity redirect helper for Decap CMS. When someone opens a CMS
      invite / password-recovery / confirmation link, the token arrives in the
      URL hash. Only then do we load the Identity widget and forward them to the
      /admin login. Normal visitors never load this external script.
    -->
    <script>
      (function () {
        var hash = window.location.hash || ''
        if (/(invite_token|recovery_token|confirmation_token)=/.test(hash)) {
          var s = document.createElement('script')
          s.src = 'https://identity.netlify.com/v1/netlify-identity-widget.js'
          s.onload = function () {
            window.netlifyIdentity &&
              window.netlifyIdentity.on('init', function (user) {
                if (!user) {
                  window.netlifyIdentity.on('login', function () {
                    document.location.href = '/admin/'
                  })
                }
                window.netlifyIdentity.open()
              })
          }
          document.head.appendChild(s)
        }
      })()
    </script>
  </body>
</html>
